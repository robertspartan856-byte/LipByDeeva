<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — Lip by Deeva Beauty</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<header>
  <div class="logo">
    <img src="../images/logo.png" alt="Lip by Deeva Beauty" class="header-logo">
  </div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../shop.html">Shop</a>
    <a href="../contact.html">Contact</a>
  </nav>
  <button class="mobile-menu-button" aria-label="Toggle menu">☰</button>
</header>
<main class="section-block">
  <h1>Your Cart</h1>
  <div class="cart-wrapper">
    <section id="cart-items" class="cart-items"></section>
    <aside class="cart-summary">
      <div class="summary-card">
        <h2>Order Summary</h2>
        <p class="summary-line">Total: <strong id="cart-total">₦0</strong></p>
        <p class="summary-note">Update quantities or remove items to adjust your order.</p>
        <a href="checkout.html" class="btn primary-btn">Proceed to Checkout</a>
      </div>
    </aside>
  </div>
</main>
<footer>
  <p>© 2026 Lip by Deeva Beauty. All Rights Reserved.</p>
</footer>
<script src="../script.js"></script>
</body>
</html>
